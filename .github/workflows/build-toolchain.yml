name: Build Toolchain Cache

# Builds pre-compiled PlatformIO/ESP-IDF toolchain tarballs and publishes them
# as GitHub Release assets. The app container downloads these at first start,
# avoiding the slow extraction on RPi4 SD cards on every ESPHome update.
#
# Runs weekly (Monday 04:00 UTC) and on manual dispatch.
# Skips if a release for the current ESPHome version already exists.

on:
  schedule:
    - cron: '0 4 * * *'   # Every day 04:00 UTC
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if release already exists'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── 1. Detect latest ESPHome version ──────────────────────────────────────
  check-version:
    name: Check ESPHome version
    runs-on: ubuntu-latest
    outputs:
      esphome_version: ${{ steps.version.outputs.version }}
      needs_build: ${{ steps.check.outputs.needs_build }}
    steps:
      - name: Get latest ESPHome version
        id: version
        run: |
          pip install esphome --quiet 2>/dev/null
          VERSION=$(python3 -c "from importlib.metadata import version; print(version('esphome'))")
          echo "ESPHome version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if toolchain release already exists
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/toolchain-esphome-${{ steps.version.outputs.version }}")
          echo "Release check HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] && [ "${{ inputs.force_rebuild }}" != "true" ]; then
            echo "Release already exists — skipping build."
            echo "needs_build=false" >> $GITHUB_OUTPUT
          else
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

  # ─── 2. Build toolchain for each architecture ──────────────────────────────
  build:
    name: Build toolchain (${{ matrix.arch }})
    needs: check-version
    if: needs.check-version.outputs.needs_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-22.04-arm   # Native ARM64 runner — no QEMU needed
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      # Run the full toolchain setup inside the same Alpine image the app uses.
      # The 900s timeout fires during the cmake hang on Alpine (known pio issue);
      # only the toolchain download matters, cmake configuration can be skipped.
      - name: Build toolchain inside Alpine container
        run: |
          docker run --name toolchain-build \
            -v "$PWD/docker_debug/fix_pio_wrappers.sh:/fix_pio_wrappers.sh:ro" \
            -v "$PWD/esphome:/app/esphome" \
            -v "$PWD/configurator/generate_tiles_api.py:/app/configurator/generate_tiles_api.py:ro" \
            -v "$PWD/docker_debug/prepare_precache.py:/app/prepare_precache.py:ro" \
            python:3.11-alpine sh -ec '
              echo "=== Installing build dependencies ==="
              apk add --no-cache \
                g++ gcc musl-dev python3-dev \
                sdl2-dev sdl2_image-dev sdl2_ttf-dev linux-headers \
                bash git coreutils ca-certificates cmake ninja gcompat \
                openssl libffi jpeg zlib

              apk add --no-cache --virtual .build-deps \
                rust cargo openssl-dev libffi-dev jpeg-dev zlib-dev

              echo "=== Installing ESPHome ==="
              pip3 install --no-cache-dir esphome

              apk del .build-deps

              echo "=== Installing ccache ==="
              apk add --no-cache ccache
              mkdir -p /usr/local/lib/ccache
              for name in gcc g++ cc c++; do
                ln -sf /usr/bin/ccache /usr/local/lib/ccache/$name
              done

              echo "=== Downloading ESP32 toolchain via ESPHome compile (with ccache) ==="
              mkdir -p /root/.platformio/.ccache
              export CCACHE_DIR=/root/.platformio/.ccache
              export CCACHE_MAXSIZE=2G
              export CCACHE_COMPILERCHECK=content
              export CCACHE_NODIRECT=true
              export CCACHE_SLOPPINESS=include_file_mtime,time_macros
              export PATH="/usr/local/lib/ccache:$PATH"
              export CMAKE_BUILD_PARALLEL_LEVEL=$([ "$(uname -m)" = "aarch64" ] && echo 1 || echo 2)

              echo "--- DIAG: ccache config ---"
              ccache --show-config 2>/dev/null || echo "ccache not available yet"

              echo "--- DIAG: initial ccache stats (should be zeros) ---"
              ccache --zero-stats 2>/dev/null || true
              ccache --show-stats 2>/dev/null || true

              mkdir -p /tmp/esp32_setup
              printf "esphome:\n  name: dummy\nesp32:\n  board: esp32dev\n  framework:\n    type: esp-idf\n" \
                > /tmp/esp32_setup/dummy.yaml
              cd /tmp/esp32_setup
              timeout 900s esphome compile dummy.yaml || true
              cd /
              rm -rf /tmp/esp32_setup

              echo "--- DIAG: ccache stats after toolchain download compile ---"
              ccache --show-stats 2>/dev/null || true

              echo "=== Fixing PlatformIO wrappers for Alpine/musl ==="
              bash /fix_pio_wrappers.sh || true

              echo "--- DIAG: ccache binary ---"
              command -v ccache || echo "ERROR: ccache NOT FOUND in PATH"
              ccache --version 2>/dev/null || true

              echo "--- DIAG: all xtensa wrapper scripts (first 4 lines each) ---"
              for w in /root/.platformio/packages/toolchain-xtensa-esp-elf/bin/xtensa-esp32-elf-gcc \
                       /root/.platformio/packages/toolchain-xtensa-esp-elf/bin/xtensa-esp32s3-elf-gcc \
                       /root/.platformio/packages/toolchain-xtensa-esp-elf/bin/xtensa-esp32-elf-g++ ; do
                if [ -f "$w" ]; then
                  echo "  >> $w"
                  head -4 "$w"
                  echo "     (contains ccache: $(grep -c ccache "$w" 2>/dev/null || echo 0) occurrences)"
                else
                  echo "  >> $w NOT FOUND"
                fi
              done

              echo "--- DIAG: PATH entries that contain ccache shims ---"
              echo "$PATH" | tr : "\n" | while read d; do
                [ -d "$d" ] && ls "$d" | grep -qE "^(gcc|g\+\+|cc|c\+\+)$" && echo "  shim dir: $d ($(ls $d))"
              done || true

              echo "--- DIAG: which compiler will PlatformIO see? ---"
              which gcc g++ cc c++ 2>/dev/null || true
              ls -la $(which gcc 2>/dev/null) 2>/dev/null || true

              PIO_CMAKE=$(find /root/.platformio/packages -path "*/tool-cmake/bin/cmake" 2>/dev/null | head -1)
              if [ -n "$PIO_CMAKE" ]; then
                mv "$PIO_CMAKE" "${PIO_CMAKE}.orig"
                printf "#!/bin/sh\nexec /usr/bin/cmake \"\$@\"\n" > "$PIO_CMAKE"
                chmod +x "$PIO_CMAKE"
                echo "Replaced cmake wrapper: $PIO_CMAKE"
              else
                echo "cmake wrapper not found — may already be system cmake"
              fi

              PIO_NINJA=$(find /root/.platformio/packages -path "*/tool-ninja/ninja" 2>/dev/null | head -1)
              if [ -n "$PIO_NINJA" ]; then
                mv "$PIO_NINJA" "${PIO_NINJA}.orig"
                printf "#!/bin/sh\nexec /usr/bin/ninja \"\$@\"\n" > "$PIO_NINJA"
                chmod +x "$PIO_NINJA"
                echo "Replaced ninja wrapper: $PIO_NINJA"
              else
                echo "ninja wrapper not found — may already be system ninja"
              fi

              find /root/.platformio -name "*.orig" -delete 2>/dev/null || true

              # Remove the dist cache — not needed at runtime
              rm -rf /root/.platformio/dist

              echo "=== Re-compiling ESP32 firmware to populate ccache ==="

              echo "--- DIAG: ccache stats before cachewarm (zeroing now) ---"
              ccache --zero-stats 2>/dev/null || true
              ccache --show-stats 2>/dev/null || true
              du -sh /root/.platformio/.ccache/ 2>/dev/null || echo "(cache dir empty)"

              export CCACHE_LOGFILE=/tmp/ccache_warm.log
              export CCACHE_DEBUG=1
              export CCACHE_DEBUGDIR=/tmp/ccache_debug

              if [ -f /app/esphome/esp32_cachewarm.yaml ]; then
                echo "--- DIAG: esp32_cachewarm.yaml found, compiling from $(pwd) ---"
                echo "--- DIAG: CCACHE_DIR=$CCACHE_DIR CCACHE_NODIRECT=$CCACHE_NODIRECT ---"
                echo "--- DIAG: CCACHE_SLOPPINESS=$CCACHE_SLOPPINESS ---"
                cd /app/esphome
                timeout 1800s esphome compile esp32_cachewarm.yaml || true
                cd /
              else
                echo "ERROR: esp32_cachewarm.yaml not found in /app/esphome — skipping component pre-warm"
                echo "       This file must be present in esphome/ in the repo and mounted via the -v bind."
                ls /app/esphome/ 2>/dev/null || echo "(cannot list /app/esphome/)"
              fi

              echo "--- DIAG: ccache stats after cachewarm (key metric: cache_miss vs cache_hit) ---"
              ccache --show-stats --verbose 2>/dev/null || ccache --show-stats 2>/dev/null || true
              du -sh /root/.platformio/.ccache/ 2>/dev/null || echo "(empty)"

              echo "--- DIAG: first 60 lines of ccache log (miss reasons) ---"
              head -60 /tmp/ccache_warm.log 2>/dev/null || echo "(no log written — ccache was never invoked)"

              echo "--- DIAG: sample .ccache-input-text for one object (shows what ccache hashed) ---"
              DBGSAMPLE=$(find /tmp/ccache_debug -name "*.ccache-input-text" 2>/dev/null | head -1)
              if [ -n "$DBGSAMPLE" ]; then
                echo "  File: $DBGSAMPLE"
                head -40 "$DBGSAMPLE"
              else
                echo "  (no debug files — cache was empty, all misses expected on first warm)"
              fi

              unset CCACHE_LOGFILE CCACHE_DEBUG CCACHE_DEBUGDIR

              echo "=== Pre-compiling emulator to warm ccache ==="
              echo "--- DIAG: /app permissions ---"
              ls -la / | grep -E "^d.*app" || echo "(no /app in /)"
              chmod 755 /app 2>/dev/null || true
              mkdir -p /app/configurator || true

              python3 /app/prepare_precache.py || true

              echo "--- DIAG: ccache stats before emulator warm (zeroing now) ---"
              ccache --zero-stats 2>/dev/null || true

              export CCACHE_LOGFILE=/tmp/ccache_emulator.log

              cd /app/esphome
              esphome \
                -s tiles_file test_device_tiles.yaml \
                -s screen_w 320 -s screen_h 240 \
                -s font_tiny 24 -s font_small 40 -s font_medium 60 -s font_big 80 \
                -s font_text_regular 20 -s font_text_bold 20 \
                -s font_text_big_bold 30 -s font_text_small 12 \
                compile lib/emulator.yaml || true

              echo "--- DIAG: ccache stats after first emulator compile (320x240) ---"
              ccache --show-stats 2>/dev/null || true
              ccache --zero-stats 2>/dev/null || true

              esphome \
                -s tiles_file test_device_tiles.yaml \
                -s screen_w 480 -s screen_h 320 \
                -s font_tiny 32 -s font_small 60 -s font_medium 80 -s font_big 100 \
                -s font_text_regular 30 -s font_text_bold 30 \
                -s font_text_big_bold 40 -s font_text_small 18 \
                compile lib/emulator.yaml || true

              echo "--- DIAG: ccache stats after second emulator compile 480x320 (should be high hit rate since same source) ---"
              ccache --show-stats 2>/dev/null || true

              echo "--- DIAG: first 40 lines of emulator ccache log ---"
              head -40 /tmp/ccache_emulator.log 2>/dev/null || echo "(no log)"
              unset CCACHE_LOGFILE

              echo "=== Re-fixing PlatformIO wrappers after emulator pre-compiles ==="
              bash /fix_pio_wrappers.sh || true

              # clean up the temporary tiles file written by prepare_precache.py
              rm -f /app/esphome/lib/test_device_tiles.yaml

              # marker consumed by toolchain_setup.py to skip local warming
              touch /root/.platformio/.ccache/.cyd_warmed

              echo "--- DIAG: FINAL ccache stats ---"
              ccache --show-stats --verbose 2>/dev/null || ccache --show-stats 2>/dev/null || true
              du -sh /root/.platformio/.ccache/ || true

              echo "=== Toolchain build complete ==="
              du -sh /root/.platformio/packages/ || true
            '

      - name: Extract packages from container
        run: |
          mkdir -p /tmp/toolchain-export
          docker cp toolchain-build:/root/.platformio/packages /tmp/toolchain-export/packages
          docker cp toolchain-build:/root/.platformio/platforms /tmp/toolchain-export/platforms 2>/dev/null || echo "No platforms dir — skipping"
          docker cp toolchain-build:/root/.platformio/.ccache  /tmp/toolchain-export/.ccache  2>/dev/null || echo "No .ccache dir — skipping"
          docker rm toolchain-build

      - name: Create toolchain tarball
        run: |
          cd /tmp/toolchain-export
          echo "Creating toolchain-${{ matrix.arch }}.tar.xz ..."
          DIRS="packages/"
          [ -d platforms ] && DIRS="$DIRS platforms/"
          [ -d .ccache ]   && DIRS="$DIRS .ccache/"
          XZ_OPT="-2" tar -cJhf toolchain-${{ matrix.arch }}.tar.xz $DIRS
          ls -lh toolchain-${{ matrix.arch }}.tar.xz

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: toolchain-${{ matrix.arch }}
          path: /tmp/toolchain-export/toolchain-${{ matrix.arch }}.tar.xz
          retention-days: 1

  # ─── 3. Publish GitHub Release with both tarballs ──────────────────────────
  create-release:
    name: Publish release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: /tmp/toolchain-artifacts

      - name: Create build ID file
        id: build_id
        run: |
          BUILD_ID="${{ needs.check-version.outputs.esphome_version }}-$(date -u +%Y%m%d)-run${{ github.run_number }}"
          echo "$BUILD_ID" > /tmp/build_id.txt
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Build ID: $BUILD_ID"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: toolchain-esphome-${{ needs.check-version.outputs.esphome_version }}
          name: "Toolchain Cache: ESPHome ${{ needs.check-version.outputs.esphome_version }}"
          body: |
            Pre-built PlatformIO/ESP-IDF toolchain for Alpine Linux (musl).

            **ESPHome version:** `${{ needs.check-version.outputs.esphome_version }}`
            **Build ID:** `${{ steps.build_id.outputs.build_id }}`
            **Architectures:** `amd64`, `arm64`

            These tarballs are downloaded automatically by the CYD Tiled Display add-on
            on first start (or after an ESPHome version change). A progress bar is shown
            in the configurator UI during download and extraction.
          files: |
            /tmp/toolchain-artifacts/toolchain-amd64/toolchain-amd64.tar.xz
            /tmp/toolchain-artifacts/toolchain-arm64/toolchain-arm64.tar.xz
            /tmp/build_id.txt
          prerelease: false
          make_latest: false
