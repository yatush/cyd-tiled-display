# esp32_cachewarm.yaml
# Used ONLY by the CI build-toolchain workflow to pre-warm the ccache for all
# ESPHome components common to CYD device builds.
# NOT intended for actual hardware — credentials are dummies.
#
# Why this exists:
#   The CI dummy build used to compile a minimal "esp32dev + esp-idf" YAML,
#   which only warms the ESP-IDF framework layer.  Real CYD device builds also
#   compile api/*, binary_sensor/*, button/*, display/*, copy/sensor/*, etc.
#   Those files had cold cache on the user's first OTA install.
#   This YAML includes all the typical CYD components so those files are
#   cached in the pre-built tarball and the first real build is fast too.

esphome:
  name: cachewarm

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

wifi:
  ssid: "dummy_network"
  password: "dummy_password_1234"

api:
  encryption:
    key: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmo="

ota:
  - platform: esphome

time:
  - platform: homeassistant
    id: homeassistant_time

# ---- Sensor components -------------------------------------------------------
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_sensor

  - platform: adc
    pin: GPIO34
    id: adc_sensor
    name: "ADC"
    update_interval: 5s
    internal: true

  - platform: copy
    name: "WiFi Copy"
    source_id: wifi_signal_sensor

  - platform: ld2410
    moving_distance: { name: Radar Moving Distance }
    still_distance: { name: Radar Still Distance }
    moving_energy: { name: Radar Move Energy }
    still_energy: { name: Radar Still Energy }
    detection_distance: { name: Radar Detection Distance }
    light: { name: Radar Light }
    g0: { move_energy: { name: g0 move energy }, still_energy: { name: g0 still energy } }
    g1: { move_energy: { name: g1 move energy }, still_energy: { name: g1 still energy } }
    g2: { move_energy: { name: g2 move energy }, still_energy: { name: g2 still energy } }
    g3: { move_energy: { name: g3 move energy }, still_energy: { name: g3 still energy } }
    g4: { move_energy: { name: g4 move energy }, still_energy: { name: g4 still energy } }
    g5: { move_energy: { name: g5 move energy }, still_energy: { name: g5 still energy } }
    g6: { move_energy: { name: g6 move energy }, still_energy: { name: g6 still energy } }
    g7: { move_energy: { name: g7 move energy }, still_energy: { name: g7 still energy } }
    g8: { move_energy: { name: g8 move energy }, still_energy: { name: g8 still energy } }

# ---- Binary sensor -----------------------------------------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
    name: "button"
    id: cw_button

  - platform: ld2410
    has_target:
      name: Radar Target
      id: radar_has_target
    has_moving_target:
      name: Radar Moving Target
    has_still_target:
      name: Radar Still Target

  - platform: touchscreen
    touchscreen_id: touchscreen_xpt
    name: Dummy Touch Btn
    x_min: 0
    x_max: 0
    y_min: 0
    y_max: 0
    internal: true

# ---- Button ------------------------------------------------------------------
button:
  - platform: restart
    name: "Restart"

# ---- Output + light (compiled by typical CYD builds) ------------------------
output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm
  - platform: ledc
    id: output_red
    pin: GPIO4
    inverted: true
  - platform: ledc
    id: output_green
    pin: GPIO16
    inverted: true
  - platform: ledc
    id: output_blue
    pin: GPIO17
    inverted: true

light:
  - platform: rgb
    name: "RGB LED"
    red: output_red
    green: output_green
    blue: output_blue

# ---- SPI + ILI9xxx display (same driver family as all CYD boards) -----------
spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

display:
  - platform: ili9xxx
    model: ILI9341
    id: disp
    spi_id: tft
    cs_pin: GPIO15
    dc_pin: GPIO2
    lambda: |-
      it.fill(Color(0, 0, 0));

# ---- I²C (GT911 touch on 3248s035, LD2410 presence sensor) -----------------
i2c:
  id: i2c_bus1
  sda: GPIO19
  scl: GPIO20

# ---- UART (used by ld2410 radar component on 3248s035) ----------------------
uart:
  id: uart_ld2410
  tx_pin: GPIO22
  rx_pin: GPIO27
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

# ---- Globals (same set as lib_common.yaml, keeps globals/* compiled) --------
globals:
  - id: cw_int
    type: int
    initial_value: "0"
  - id: cw_bool
    type: bool
    initial_value: "false"
  - id: cw_str
    type: std::string
    restore_value: no
    initial_value: '"hello"'

# ---- LD2410 mmWave radar (3248s035 presence sensor) -------------------------
ld2410:
  id: ld2410_radar

# ---- Switch (template + ld2410 engineering mode) ----------------------------
switch:
  - platform: template
    name: "Touch Calibration"
    id: touch_calibration
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: ld2410
    engineering_mode:
      name: "Radar Engineering Mode"
    bluetooth:
      name: "Radar Bluetooth"

# ---- Number (ld2410 per-gate sensitivity thresholds) ------------------------
number:
  - platform: ld2410
    timeout: { name: Radar Timeout }
    max_move_distance_gate: { name: Radar Max Move Distance }
    max_still_distance_gate: { name: Radar Max Still Distance }
    light_threshold: { name: Radar Light Threshold }
    g0:
      move_threshold: { name: g0 move threshold, id: g0m }
      still_threshold: { name: g0 still threshold, id: g0s }
    g1:
      move_threshold: { name: g1 move threshold, id: g1m }
      still_threshold: { name: g1 still threshold, id: g1s }
    g2:
      move_threshold: { name: g2 move threshold, id: g2m }
      still_threshold: { name: g2 still threshold, id: g2s }
    g3:
      move_threshold: { name: g3 move threshold, id: g3m }
      still_threshold: { name: g3 still threshold, id: g3s }
    g4:
      move_threshold: { name: g4 move threshold, id: g4m }
      still_threshold: { name: g4 still threshold, id: g4s }
    g5:
      move_threshold: { name: g5 move threshold, id: g5m }
      still_threshold: { name: g5 still threshold, id: g5s }
    g6:
      move_threshold: { name: g6 move threshold, id: g6m }
      still_threshold: { name: g6 still threshold, id: g6s }
    g7:
      move_threshold: { name: g7 move threshold, id: g7m }
      still_threshold: { name: g7 still threshold, id: g7s }
    g8:
      move_threshold: { name: g8 move threshold, id: g8m }
      still_threshold: { name: g8 still threshold, id: g8s }

# ---- Touchscreen (both CYD variants: xpt2046 SPI and gt911 I²C) -------------
touchscreen:
  - platform: xpt2046
    id: touchscreen_xpt
    spi_id: touch
    cs_pin: GPIO33
    threshold: 400
    calibration: { x_min: 360, x_max: 3780, y_min: 320, y_max: 3800 }
    transform:
      swap_xy: true
  - platform: gt911
    id: touchscreen_gt
    display: disp
    i2c_id: i2c_bus1
    address: 0x5D
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: true

# ---- Text sensor (homeassistant platform) ------------------------------------
text_sensor:
  - platform: homeassistant
    id: cw_text
    entity_id: sensor.dummy
    internal: true

# ---- Script (warms script/*.o + HA service stubs) ---------------------------
script:
  - id: _cw_script
    then:
      - homeassistant.service:
          service: homeassistant.update_entity
          data:
            entity_id: sensor.dummy

# ---- Font (warms font/*.o and freetype/glyph rendering code) ----------------
font:
  - file: "gfonts://Roboto"
    id: cw_font_regular
    size: 20
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .,!?%+/-:"
  - file: "gfonts://Roboto@900"
    id: cw_font_bold
    size: 20
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .,!?%+/-:"

# ---- Color (warms color-related display C++ code) ---------------------------
color:
  - id: cw_gray
    hex: "808080"
  - id: cw_red
    hex: "FF0000"
  - id: cw_green
    hex: "00FF00"
  - id: cw_blue
    hex: "0000FF"
