# Generated by the configurator when images are used.
# This file is auto-overwritten by the server on each generate/compile.
# The none_transparent entry is always present (1x1 transparent pixel used by
# tiles with image: none). The configurator regenerates the full list on each run.
image:
  - file: images/none_transparent.png
    id: none_transparent
    resize: 8x8
    type: RGB
    transparency: alpha_channel
