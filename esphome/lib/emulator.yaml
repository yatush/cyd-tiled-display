substitutions:
  device_name: "emulator"
  friendly_name: Emulator
  tiles_file: "user_config.yaml"
  # Screen dimensions and font sizes below are defaults for the 3248s035 device.
  # When launched via run_session.sh these are always overridden with values
  # parsed directly from the esphome/lib/*_base.yaml file for the selected device.
  screen_w: "480"
  screen_h: "320"
  font_tiny: "32"
  font_small: "60"
  font_medium: "80"
  font_big: "100"
  font_text_regular: "30"
  font_text_bold: "30"
  font_text_big_bold: "40"
  font_text_small: "18"

packages:
  lib: !include lib_emulator.yaml

esphome:
  name: $device_name
  friendly_name: $friendly_name

external_components:
  - source:
      type: local
      path: ../external_components

script:
  - id: dummy_service_call
    then:
      - homeassistant.service:
          service: homeassistant.update_entity
          data:
            entity_id: sensor.dummy

host:

display:
  - platform: sdl
    id: disp
    dimensions:
      width: ${screen_w}
      height: ${screen_h}

touchscreen:
  - platform: sdl
    id: touchscreen_id
    on_touch:
      then:
        - script.execute:
            id: _handle_touch
            x: !lambda return touch.x;
            y: !lambda return touch.y;
            x_raw: !lambda return touch.x;
            y_raw: !lambda return touch.y;

binary_sensor:
  - platform: touchscreen
    id: dummy_touch_sensor
    x_min: 0
    x_max: 1
    y_min: 0
    y_max: 1

globals:
  - id: render_diffs
    type: bool
    initial_value: "false"
  - id: width
    type: int
    initial_value: "${screen_w}"
  - id: height
    type: int
    initial_value: "${screen_h}"
  - id: tile_border_width
    type: int
    initial_value: "1"

font:
  # Master glyph list - define ALL Material Icons glyphs once
  - file: "gfonts://Material+Symbols+Outlined"
    id: tiny
    size: ${font_tiny}
    glyphs: !include mdi_glyphs.yaml

  - file: "gfonts://Material+Symbols+Outlined"
    id: small
    size: ${font_small}
    glyphs: !include mdi_glyphs.yaml

  - file: "gfonts://Material+Symbols+Outlined"
    id: medium
    size: ${font_medium}
    glyphs: !include mdi_glyphs.yaml

  - file: "gfonts://Material+Symbols+Outlined"
    id: big
    size: ${font_big}
    glyphs: !include mdi_glyphs.yaml

  - file: "gfonts://Roboto"
    id: text_regular
    size: ${font_text_regular}

  - file: "gfonts://Roboto@900"
    id: text_bold
    size: ${font_text_bold}

  - file: "gfonts://Roboto@900"
    id: text_big_bold
    size: ${font_text_big_bold}

  - file: "gfonts://Roboto@900"
    id: text_small
    size: ${font_text_small}
    glyphs: !include roboto_glyphs.yaml
    
tile_ui:
  tiles_file: $tiles_file
