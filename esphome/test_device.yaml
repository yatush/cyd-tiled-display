            display:
              - tile_icon:
                  color: Color(202,205,29)
                  icon: '"\U0000e5cb"'
                  size: id(big)
            x: 2
            y: 1
        - title:
            activation_var:
              dynamic_entity: COVER
              value:
                - a
            display:
              - tile_icon:
                  color: Color(0, 0, 255)
                  icon: '"\U0000f0b0"'
                  size: id(big)
            entities:
              - entity: a
            x: 2
            y: 0
