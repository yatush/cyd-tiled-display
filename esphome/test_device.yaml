substitutions:
  device_name: "testing-usb"
  friendly_name: testing-usb

packages:
  device_base: !include lib/3248s035_base.yaml
  lib: !include lib/lib.yaml

esphome:
  name: $device_name
  friendly_name: $friendly_name

external_components:
  - source:
      path: external_components
      type: local

api:
  encryption:
    key: "NEU4hYFvG1ZDJ1r7QoQQirhFYz5SEHYxXxcdpkryAt4="

ota:
  - platform: esphome


time:
  - id: !extend esptime
    timezone: "Asia/Jerusalem"

tile_ui:
  screens:
    - id: controllers
      rows: 2
      cols: 3
      flags:
        - BASE
      tiles:
        - ha_action:
            entities:
              - entity: light.p1s_01p00a3b2200275_chamber_light
            images:
              - image: img__Pngtree_unicorn_cartoon_clipart_vector_15852197
                animation:
                  steps:
                    - from:
                        - 0.5
                        - 0.5
                      to:
                        - 0.85
                        - 0.1
                      duration: 3
                    - from:
                        - 0.85
                        - 0.1
                      to:
                        - 0.1
                        - 0.1
                      duration: 3
                      icon: '"\U0000f0b0"'
                      icon_color: light_green
                      icon_size: tiny
                    - from:
                        - 0.1
                        - 0.1
                      to:
                        - 0.5
                        - 0.5
                      duration: 3
                      image: img_6g_removebg_preview
                condition: is_lights_on
              - image: img__Pngtree_unicorn_cartoon_clipart_vector_15852197
                condition:
                  operator: NOT
                  conditions: is_lights_on
            perform:
              - action_lights
            x: 0
            y: 0
        - ha_action:
            display:
              - tile_ac
            entities:
              - entity: AC_1_ID
            perform:
              - action_ac
            x: 1
            y: 0
        - move_page:
            destination: pref
            display:
              - tile_icon:
                  color: id(gray)
                  icon: '"\U0000e8b8"'
                  size: id(medium)
            x: 2
            y: 0
        - ha_action:
            display:
              - tile_blinds_up
            display_page_if_no_entity: cover_settings
            entities:
              - dynamic_entity: COVER
            perform:
              - action_blinds_up
            requires_fast_refresh:
              operator: OR
              conditions:
                - blinds_moving_up_fn
                - blinds_moving_down_fn
            x: 0
            y: 1
        - ha_action:
            display:
              - tile_blinds_down
            display_page_if_no_entity: cover_settings
            entities:
              - dynamic_entity: COVER
            perform:
              - action_blinds_down
            requires_fast_refresh:
              operator: OR
              conditions:
                - blinds_moving_up_fn
                - blinds_moving_down_fn
            x: 1
            y: 1
        - ha_action:
            display:
              - tile_icon:
                  color: id(light_purple)
                  icon: '"\U0000e286"'
                  size: id(big)
            display_page_if_no_entity: cover_settings
            entities:
              - dynamic_entity: COVER
            perform:
              - action_blinds_mid
